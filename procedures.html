<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1E3A5F" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Procédures" />
  <title>Procédures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useCallback } = React;

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = "https://tvplckidketahxupgpfm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2cGxja2lka2V0YWh4dXBncGZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMTA4NzYsImV4cCI6MjA5Nzc4Njg3Nn0.Lfy8UMi800Vejs0HWWILp5taN3PifbRz9au-MZ-QzIY";
const ADMIN_EMAIL = "flavien.ruhaut@outlook.fr";

// ─── SUPABASE CLIENT ─────────────────────────────────────────────────────────
const sb = {
  async signIn(email, password) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, password }),
    });
    return r.json();
  },
  async signUp(email, password) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: "POST",
      headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, password }),
    });
    return r.json();
  },
  async signOut(token) {
    await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
      method: "POST",
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${token}` },
    });
  },
  async getUser(token) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${token}` },
    });
    return r.json();
  },
  async query(token, method, path, body) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      method,
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${token}`,
        "Content-Type": "application/json",
        Prefer: method === "POST" ? "return=representation" : "",
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (r.status === 204) return [];
    return r.json();
  },
};

// ─── CONSTANTES ──────────────────────────────────────────────────────────────
const CATS = [
  { id: "securite",     label: "Sécurité",     color: "#EF4444", icon: "🛡️" },
  { id: "qualite",      label: "Qualité",       color: "#F59E0B", icon: "✅" },
  { id: "maintenance",  label: "Maintenance",   color: "#3B82F6", icon: "🔧" },
  { id: "rh",           label: "RH",            color: "#8B5CF6", icon: "👥" },
  { id: "informatique", label: "Informatique",  color: "#00B4D8", icon: "💻" },
  { id: "autre",        label: "Autre",         color: "#64748B", icon: "📋" },
];
const getCat = (id) => CATS.find(c => c.id === id) || CATS[5];
const INIT_FORM = { title: "", category: "autre", description: "", steps: [""], author: "", tags: "" };

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [token, setToken] = useState(() => localStorage.getItem("sb_token"));
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!token) { setLoading(false); return; }
    sb.getUser(token).then(u => {
      if (u && u.email) setUser(u);
      else { localStorage.removeItem("sb_token"); setToken(null); }
      setLoading(false);
    });
  }, []);

  const login = (t, u) => { localStorage.setItem("sb_token", t); setToken(t); setUser(u); };
  const logout = async () => {
    await sb.signOut(token);
    localStorage.removeItem("sb_token");
    setToken(null); setUser(null);
  };

  if (loading) return (
    <div style={{minHeight:"100vh",background:"#1E3A5F",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{color:"#fff",fontSize:16}}>Chargement…</div>
    </div>
  );

  if (!token || !user) return <AuthScreen onLogin={login} />;
  return <Main token={token} user={user} isAdmin={user.email === ADMIN_EMAIL} onLogout={logout} />;
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [ok, setOk] = useState("");

  const submit = async () => {
    setErr(""); setOk("");
    if (!email || !password) { setErr("Remplissez tous les champs."); return; }
    setBusy(true);
    try {
      if (mode === "login") {
        const res = await sb.signIn(email, password);
        if (res.error) setErr(res.error.message || "Identifiants incorrects.");
        else onLogin(res.access_token, res.user);
      } else {
        const res = await sb.signUp(email, password);
        if (res.error) setErr(res.error.message || "Inscription échouée.");
        else { setOk("Compte créé ! Vérifiez votre email puis connectez-vous."); setMode("login"); }
      }
    } catch { setErr("Erreur réseau."); }
    setBusy(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"#1E3A5F",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"#fff",borderRadius:20,padding:"32px 24px",width:"100%",maxWidth:380,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{textAlign:"center",fontSize:48,marginBottom:8}}>📋</div>
        <div style={{textAlign:"center",fontSize:22,fontWeight:800,color:"#1E293B",marginBottom:4}}>Procédures</div>
        <div style={{textAlign:"center",fontSize:14,color:"#94A3B8",marginBottom:24}}>
          {mode === "login" ? "Connectez-vous pour accéder" : "Créez votre compte"}
        </div>
        {err && <div style={{background:"#FEF2F2",color:"#EF4444",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:600,marginBottom:12,textAlign:"center"}}>⚠️ {err}</div>}
        {ok  && <div style={{background:"#F0FDF4",color:"#16A34A",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:600,marginBottom:12,textAlign:"center"}}>✅ {ok}</div>}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:13,fontWeight:600,color:"#475569",marginBottom:6,display:"block"}}>Email</label>
          <input type="email" placeholder="vous@exemple.com" value={email} onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&submit()}
            style={{width:"100%",background:"#F8FAFC",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"12px 14px",fontSize:15,outline:"none",color:"#1E293B"}} />
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:13,fontWeight:600,color:"#475569",marginBottom:6,display:"block"}}>Mot de passe</label>
          <input type="password" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&submit()}
            style={{width:"100%",background:"#F8FAFC",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"12px 14px",fontSize:15,outline:"none",color:"#1E293B"}} />
        </div>
        <button onClick={submit} disabled={busy}
          style={{width:"100%",background:busy?"#CBD5E1":"#1E3A5F",color:"#fff",border:"none",borderRadius:12,padding:14,fontSize:16,fontWeight:700,cursor:busy?"not-allowed":"pointer",marginTop:4}}>
          {busy ? "⏳ En cours…" : mode==="login" ? "Se connecter" : "Créer mon compte"}
        </button>
        <div style={{textAlign:"center",marginTop:16,fontSize:14,color:"#64748B"}}>
          {mode==="login" ? <>Pas encore de compte ?{" "}
            <button onClick={()=>{setMode("signup");setErr("");}} style={{color:"#00B4D8",fontWeight:700,cursor:"pointer",background:"none",border:"none",fontSize:14}}>S'inscrire</button></>
          : <>Déjà un compte ?{" "}
            <button onClick={()=>{setMode("login");setErr("");}} style={{color:"#00B4D8",fontWeight:700,cursor:"pointer",background:"none",border:"none",fontSize:14}}>Se connecter</button></>}
        </div>
        <div style={{marginTop:20,padding:12,background:"#F8FAFC",borderRadius:10,fontSize:12,color:"#94A3B8",lineHeight:1.6}}>
          <strong style={{color:"#475569"}}>ℹ️ Accès :</strong><br/>
          • <strong>Utilisateurs</strong> : consultation uniquement<br/>
          • <strong>Admin</strong> ({ADMIN_EMAIL}) : création, modification, suppression
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function Main({ token, user, isAdmin, onLogout }) {
  const [screen, setScreen] = useState("list");
  const [procedures, setProcedures] = useState([]);
  const [selected, setSelected] = useState(null);
  const [form, setForm] = useState(INIT_FORM);
  const [editMode, setEditMode] = useState(false);
  const [filterCat, setFilterCat] = useState("all");
  const [search, setSearch] = useState("");
  const [toast, setToast] = useState(null);
  const [busy, setBusy] = useState(false);

  const showToast = (msg, color="#10B981") => { setToast({msg,color}); setTimeout(()=>setToast(null),2500); };

  const load = useCallback(async () => {
    try {
      const data = await sb.query(token, "GET", "procedures?order=created_at.desc");
      if (Array.isArray(data)) setProcedures(data);
    } catch {}
  }, [token]);

  useEffect(() => { load(); }, [load]);

  const filtered = procedures.filter(p => {
    const mc = filterCat==="all" || p.category===filterCat;
    const q = search.toLowerCase();
    return mc && (!q || p.title?.toLowerCase().includes(q) || p.description?.toLowerCase().includes(q) || p.tags?.some(t=>t.toLowerCase().includes(q)));
  });

  const addStep = () => setForm(f=>({...f,steps:[...f.steps,""]}));
  const updateStep = (i,v) => setForm(f=>({...f,steps:f.steps.map((s,idx)=>idx===i?v:s)}));
  const removeStep = (i) => setForm(f=>({...f,steps:f.steps.filter((_,idx)=>idx!==i)}));

  const save = async () => {
    if (!form.title.trim()) return;
    setBusy(true);
    const payload = {
      ...form,
      steps: form.steps.filter(s=>s.trim()),
      tags: typeof form.tags==="string" ? form.tags.split(",").map(t=>t.trim()).filter(Boolean) : form.tags,
      date: new Date().toISOString().slice(0,10),
    };
    try {
      if (editMode && selected) {
        await sb.query(token,"PATCH",`procedures?id=eq.${selected.id}`,payload);
        showToast("✅ Mise à jour réussie !");
        setScreen("list");
      } else {
        await sb.query(token,"POST","procedures",payload);
        showToast("✅ Procédure créée !");
        setScreen("list");
      }
      await load();
    } catch { showToast("❌ Erreur", "#EF4444"); }
    setForm(INIT_FORM); setEditMode(false); setBusy(false);
  };

  const del = async (id) => {
    if (!window.confirm("Supprimer cette procédure ?")) return;
    await sb.query(token,"DELETE",`procedures?id=eq.${id}`);
    showToast("🗑️ Supprimée","#64748B");
    setScreen("list"); await load();
  };

  const startEdit = (p) => {
    setForm({...p, tags: Array.isArray(p.tags)?p.tags.join(", "):p.tags||""});
    setEditMode(true); setScreen("add");
  };

  // Styles inline réutilisables
  const hdr = {background:"#1E3A5F",color:"#fff",padding:"18px 20px 14px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10};
  const content = {flex:1,padding:"16px 16px 100px",overflowY:"auto"};
  const bnav = {position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#fff",borderTop:"1px solid #E2E8F0",display:"flex",padding:"8px 0 12px",zIndex:10};
  const inp = {width:"100%",background:"#F8FAFC",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 14px",fontSize:15,outline:"none",color:"#1E293B"};
  const lbl = {fontSize:13,fontWeight:600,color:"#475569",marginBottom:6,display:"block"};
  const fsec = {marginBottom:18};

  const NavBtn = ({active, onClick, icon, label}) => (
    <button onClick={onClick} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,border:"none",background:"none",cursor:"pointer",fontSize:11,fontWeight:active?700:500,color:active?"#1E3A5F":"#94A3B8"}}>
      <span style={{fontSize:22,filter:active?"none":"grayscale(1) opacity(0.6)"}}>{icon}</span>{label}
    </button>
  );

  // ── LIST
  if (screen==="list") return (
    <div style={{fontFamily:"'Inter',system-ui",background:"#F0F4F8",minHeight:"100vh",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      {toast && <div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",borderRadius:12,padding:"10px 24px",fontWeight:700,fontSize:15,zIndex:100,whiteSpace:"nowrap",boxShadow:`0 4px 16px ${toast.color}66`}}>{toast.msg}</div>}
      <div style={hdr}>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:700}}>📋 Procédures</div>
          <div style={{fontSize:12,color:"#90B4D8",marginTop:2}}>
            {isAdmin
              ? <span style={{background:"#F59E0B18",color:"#D97706",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20}}>👑 Admin</span>
              : <span style={{background:"#00B4D818",color:"#0284C7",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20}}>👁️ Lecture seule</span>
            }{" "}{user.email}
          </div>
        </div>
        <button onClick={onLogout} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:16}} title="Déconnexion">⎋</button>
      </div>
      <div style={content}>
        <input placeholder="🔍  Rechercher…" value={search} onChange={e=>setSearch(e.target.value)}
          style={{...inp,marginBottom:14,borderRadius:12}} />
        <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:16,paddingBottom:4,scrollbarWidth:"none"}}>
          <button onClick={()=>setFilterCat("all")} style={{padding:"6px 14px",borderRadius:20,border:`2px solid ${filterCat==="all"?"#1E3A5F":"#E2E8F0"}`,background:filterCat==="all"?"#1E3A5F":"#fff",color:filterCat==="all"?"#fff":"#475569",fontWeight:600,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>Toutes</button>
          {CATS.map(c=>(
            <button key={c.id} onClick={()=>setFilterCat(c.id)} style={{padding:"6px 14px",borderRadius:20,border:`2px solid ${filterCat===c.id?c.color:"#E2E8F0"}`,background:filterCat===c.id?c.color:"#fff",color:filterCat===c.id?"#fff":"#475569",fontWeight:600,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>
              {c.icon} {c.label}
            </button>
          ))}
        </div>
        {filtered.length===0 ? (
          <div style={{textAlign:"center",padding:"48px 20px",color:"#94A3B8"}}>
            <div style={{fontSize:48}}>📂</div>
            <div style={{fontWeight:700,fontSize:16,color:"#475569",marginTop:12}}>Aucune procédure trouvée</div>
            {isAdmin && <div style={{fontSize:13,marginTop:6}}>Créez votre première procédure avec le bouton +</div>}
          </div>
        ) : filtered.map(proc => {
          const cat = getCat(proc.category);
          return (
            <div key={proc.id} onClick={()=>{setSelected(proc);setScreen("detail");}}
              style={{background:"#fff",borderRadius:16,marginBottom:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.07)",borderLeft:`4px solid ${cat.color}`,cursor:"pointer"}}>
              <div style={{padding:"14px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{fontSize:16,fontWeight:700,color:"#1E293B",flex:1,lineHeight:1.3}}>{proc.title}</div>
                  <span style={{background:cat.color+"18",color:cat.color,fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:20,marginLeft:8,whiteSpace:"nowrap"}}>{cat.icon} {cat.label}</span>
                </div>
                <div style={{fontSize:12,color:"#94A3B8",marginTop:6}}>Par {proc.author} · {proc.date}</div>
                <div style={{fontSize:13,color:"#64748B",marginTop:6,lineHeight:1.5}}>{proc.description}</div>
                {proc.tags?.length>0 && (
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                    {proc.tags.map((t,i)=><span key={i} style={{background:"#F1F5F9",color:"#64748B",fontSize:11,padding:"2px 8px",borderRadius:10}}>#{t}</span>)}
                  </div>
                )}
              </div>
              <div style={{background:cat.color+"12",borderTop:`1px solid ${cat.color}22`,padding:"8px 16px",fontSize:12,color:cat.color,fontWeight:600}}>
                {proc.steps?.length||0} étape{proc.steps?.length>1?"s":""}
              </div>
            </div>
          );
        })}
      </div>
      {isAdmin && (
        <button onClick={()=>{setEditMode(false);setForm(INIT_FORM);setScreen("add");}}
          style={{position:"fixed",bottom:80,right:20,width:56,height:56,borderRadius:28,background:"#00B4D8",color:"#fff",border:"none",fontSize:26,cursor:"pointer",boxShadow:"0 4px 16px rgba(0,180,216,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:20}}>＋</button>
      )}
      <div style={bnav}>
        <NavBtn active={true} icon="📋" label="Liste" />
        {isAdmin && <NavBtn active={false} onClick={()=>{setEditMode(false);setForm(INIT_FORM);setScreen("add");}} icon="✏️" label="Créer" />}
        <NavBtn active={false} onClick={onLogout} icon="⎋" label="Quitter" />
      </div>
    </div>
  );

  // ── DETAIL
  if (screen==="detail" && selected) {
    const cat = getCat(selected.category);
    return (
      <div style={{fontFamily:"'Inter',system-ui",background:"#F0F4F8",minHeight:"100vh",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column"}}>
        {toast && <div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",borderRadius:12,padding:"10px 24px",fontWeight:700,fontSize:15,zIndex:100,whiteSpace:"nowrap"}}>{toast.msg}</div>}
        <div style={hdr}>
          <button onClick={()=>setScreen("list")} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:16}}>←</button>
          <div style={{fontSize:18,fontWeight:700,flex:1}}>Détail</div>
          {isAdmin && <span style={{background:"#F59E0B18",color:"#F59E0B",fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:20}}>👑 Admin</span>}
        </div>
        <div style={content}>
          {!isAdmin && (
            <div style={{background:"#F0F9FF",border:"1px solid #BAE6FD",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#0369A1",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18}}>👁️</span> Mode consultation — seul l'administrateur peut modifier.
            </div>
          )}
          <div style={{background:`linear-gradient(135deg,${cat.color} 0%,${cat.color}CC 100%)`,color:"#fff",padding:20,borderRadius:14,marginBottom:12}}>
            <div style={{fontSize:32,marginBottom:8}}>{cat.icon}</div>
            <div style={{fontSize:22,fontWeight:800,lineHeight:1.2,marginBottom:6}}>{selected.title}</div>
            <div style={{fontSize:13,opacity:0.85}}>{cat.label} · Par {selected.author} · {selected.date}</div>
          </div>
          <div style={{background:"#fff",borderRadius:14,padding:16,marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:"#94A3B8",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Description</div>
            <div style={{fontSize:15,color:"#334155",lineHeight:1.6}}>{selected.description}</div>
          </div>
          <div style={{background:"#fff",borderRadius:14,padding:16,marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:"#94A3B8",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Étapes ({selected.steps?.length||0})</div>
            {selected.steps?.map((step,i)=>(
              <div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:10}}>
                <div style={{width:28,height:28,borderRadius:14,background:cat.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}}>{i+1}</div>
                <div style={{fontSize:14,color:"#334155",paddingTop:5,lineHeight:1.4}}>{step}</div>
              </div>
            ))}
          </div>
          {selected.tags?.length>0 && (
            <div style={{background:"#fff",borderRadius:14,padding:16,marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:"#94A3B8",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Tags</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {selected.tags.map((t,i)=><span key={i} style={{background:"#F1F5F9",color:"#64748B",fontSize:11,padding:"2px 8px",borderRadius:10}}>#{t}</span>)}
              </div>
            </div>
          )}
          {isAdmin && (
            <>
              <button onClick={()=>startEdit(selected)} style={{width:"100%",background:"#EFF6FF",color:"#1E3A5F",border:"1.5px solid #BFDBFE",borderRadius:12,padding:12,fontSize:15,fontWeight:600,cursor:"pointer",marginBottom:8}}>✏️ Modifier</button>
              <button onClick={()=>del(selected.id)} style={{width:"100%",background:"#FEF2F2",color:"#EF4444",border:"1.5px solid #FECACA",borderRadius:12,padding:12,fontSize:15,fontWeight:600,cursor:"pointer"}}>🗑️ Supprimer</button>
            </>
          )}
        </div>
        <div style={bnav}>
          <NavBtn active={false} onClick={()=>setScreen("list")} icon="📋" label="Liste" />
          {isAdmin && <NavBtn active={false} onClick={()=>startEdit(selected)} icon="✏️" label="Modifier" />}
          <NavBtn active={false} onClick={onLogout} icon="⎋" label="Quitter" />
        </div>
      </div>
    );
  }

  // ── FORM (admin)
  if (screen==="add") {
    const cat = getCat(form.category);
    return (
      <div style={{fontFamily:"'Inter',system-ui",background:"#F0F4F8",minHeight:"100vh",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column"}}>
        {toast && <div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",borderRadius:12,padding:"10px 24px",fontWeight:700,fontSize:15,zIndex:100,whiteSpace:"nowrap"}}>{toast.msg}</div>}
        <div style={hdr}>
          <button onClick={()=>{setScreen(editMode?"list":"list");setEditMode(false);setForm(INIT_FORM);}} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:16}}>←</button>
          <div style={{fontSize:18,fontWeight:700,flex:1}}>{editMode?"✏️ Modifier":"Nouvelle procédure"}</div>
          <span style={{background:"#F59E0B18",color:"#F59E0B",fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:20}}>👑 Admin</span>
        </div>
        <div style={content}>
          <div style={fsec}>
            <label style={lbl}>Titre *</label>
            <input style={inp} placeholder="Ex : Gestion des incidents…" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} />
          </div>
          <div style={fsec}>
            <label style={lbl}>Catégorie</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {CATS.map(c=>(
                <div key={c.id} onClick={()=>setForm(f=>({...f,category:c.id}))}
                  style={{border:`2px solid ${form.category===c.id?c.color:"#E2E8F0"}`,background:form.category===c.id?c.color+"12":"#F8FAFC",borderRadius:10,padding:"10px 6px",textAlign:"center",cursor:"pointer"}}>
                  <div style={{fontSize:22}}>{c.icon}</div>
                  <div style={{fontSize:11,fontWeight:700,color:form.category===c.id?c.color:"#94A3B8",marginTop:4}}>{c.label}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={fsec}>
            <label style={lbl}>Description</label>
            <textarea style={{...inp,resize:"none",lineHeight:1.5,minHeight:80}} placeholder="Décrivez brièvement…"
              value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} />
          </div>
          <div style={fsec}>
            <label style={lbl}>Étapes</label>
            {form.steps.map((step,i)=>(
              <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                <div style={{width:28,height:28,borderRadius:14,background:cat.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}}>{i+1}</div>
                <input style={{flex:1,background:"#F8FAFC",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"9px 12px",fontSize:14,outline:"none"}}
                  placeholder={`Étape ${i+1}…`} value={step} onChange={e=>updateStep(i,e.target.value)} />
                {form.steps.length>1 && <button onClick={()=>removeStep(i)} style={{background:"#FEF2F2",border:"none",color:"#EF4444",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:16}}>×</button>}
              </div>
            ))}
            <button onClick={addStep} style={{background:"#F0F9FF",border:"1.5px dashed #00B4D8",color:"#00B4D8",borderRadius:10,padding:10,fontSize:14,fontWeight:600,cursor:"pointer",width:"100%"}}>+ Ajouter une étape</button>
          </div>
          <div style={fsec}>
            <label style={lbl}>Auteur</label>
            <input style={inp} placeholder="Votre nom…" value={form.author} onChange={e=>setForm(f=>({...f,author:e.target.value}))} />
          </div>
          <div style={fsec}>
            <label style={lbl}>Tags (séparés par des virgules)</label>
            <input style={inp} placeholder="Ex : sécurité, urgence" value={form.tags} onChange={e=>setForm(f=>({...f,tags:e.target.value}))} />
          </div>
          <button onClick={save} disabled={!form.title.trim()||busy}
            style={{width:"100%",background:(!form.title.trim()||busy)?"#CBD5E1":"#1E3A5F",color:"#fff",border:"none",borderRadius:12,padding:14,fontSize:16,fontWeight:700,cursor:(!form.title.trim()||busy)?"not-allowed":"pointer",marginTop:8}}>
            {busy?"⏳ Enregistrement…":editMode?"💾 Enregistrer les modifications":"💾 Créer la procédure"}
          </button>
        </div>
        <div style={bnav}>
          <NavBtn active={false} onClick={()=>setScreen("list")} icon="📋" label="Liste" />
          <NavBtn active={true} icon="✏️" label={editMode?"Modifier":"Créer"} />
          <NavBtn active={false} onClick={onLogout} icon="⎋" label="Quitter" />
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
